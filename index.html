<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Augustine's JS Projects</title>
    <style>
    body { 
        font-family: sans-serif; 
        text-align: center; 
        padding: 50px; 
        background-color: #f4f4f4; 
    }
    .container { 
        background: white; 
        padding: 40px; 
        border-radius: 15px; 
        display: inline-block; 
        box-shadow: 0 10px 20px rgba(0,0,0,0.1); 
    }
    h1 { 
        color: #333; 
        margin-bottom: 30px;
    }
    ul { 
        list-style: none; 
        padding: 0; 
        margin: 0;
    }
    li { 
        /* This creates the vertical space between your buttons */
        margin-bottom: 20px; 
    }
    a { 
        text-decoration: none; 
        color: #007bff; 
        font-weight: bold; 
        font-size: 1.1rem; 
        border: 2px solid #007bff; 
        padding: 12px 30px; 
        border-radius: 8px; 
        transition: all 0.3s ease;
        /* Making it a block ensures the whole button area is clickable and stays centered */
        display: inline-block; 
        min-width: 200px;
    }
    a:hover { 
        background: #007bff; 
        color: white; 
        transform: translateY(-3px); /* Subtle lift effect */
        box-shadow: 0 4px 8px rgba(0,123,255,0.3);
    }
</style>
</head>
<body>
    <div class="container">
        <h1>My JavaScript Project Gallery</h1>
        <ul>
            <li><a href="./project-rock-paper-scissors-game/index.html">Rock Paper Scissors Game</a></li>
            <li><a href="./project-etch-a-sketch/index.html">Etch-A-Sketch</a></li>
        </ul>
    </div>
</body>
</html>

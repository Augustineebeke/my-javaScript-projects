<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Rock-Paper-Scissors Game</title>
    <link rel="stylesheet" href="rock-paper-scissors-game.css">
    <script src="rock-paper-scissors-game.js" defer></script>
</head>
<body>
    <h1 class="title">This is Rock, Paper, Scissors Game</h1>
    <h2 class="title">Play by clicking the buttons below</h2>

    <div id="controls" class="game-container">
        <button class="btn" id="rock">Rock</button>
        <button class="btn" id="paper">Paper</button>
        <button class="btn" id="scissors">Scissors</button>
    </div>

    <div class="result" id="results"></div>
    
</body>
</html>
